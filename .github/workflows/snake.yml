name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/snake.yml'

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
            dist/snake-black.gif?color_snake=00ff00&color_dots=#000000,#1a472a,#2d8a4d,#44cc66,#7fff00&color_background=000000
            dist/snake-dotnet.gif?color_snake=512BD4&color_dots=#000000,#1a0a2e,#2a1a4e,#3a2a6e,#512BD4&color_background=000000

      - name: Push changes
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: snake-output